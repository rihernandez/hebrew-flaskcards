version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: flashcard_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: flashcard_auth
    volumes:
      - mongo_data:/data/db
    networks:
      - flashcard_network

  mongo-express:
    image: mongo-express:latest
    container_name: flashcard_mongo_ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secret123
      ME_CONFIG_MONGODB_URL: mongodb://admin:secret123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - flashcard_network

volumes:
  mongo_data:

networks:
  flashcard_network:
    driver: bridge
