name: Build Tauri (Windows + Linux)

on:
  push:
    branches: [main, master]
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: frontend
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v__VERSION__-build-{0}', github.run_number) }}
          releaseName: Hebrew Flashcards v__VERSION__
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
          includeUpdaterJson: false

      - name: Upload updater manifest (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest-windows
          path: frontend/src-tauri/target/release/bundle/latest.json
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: frontend
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v__VERSION__-build-{0}', github.run_number) }}
          releaseName: Hebrew Flashcards v__VERSION__
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
          includeUpdaterJson: false

      - name: Upload updater manifest (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest-linux
          path: frontend/src-tauri/target/release/bundle/latest.json
          if-no-files-found: error

  publish-updater-manifest:
    runs-on: ubuntu-22.04
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: updater-manifest-*
          path: updater-manifests

      - name: Merge Windows + Linux updater manifests
        run: |
          jq -s '
            reduce .[] as $item (
              {};
              .version = $item.version
              | .notes = ($item.notes // .notes // "")
              | .pub_date = $item.pub_date
              | .platforms = ((.platforms // {}) + ($item.platforms // {}))
            )
          ' updater-manifests/*/latest.json > latest.json

      - name: Upload merged latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber
