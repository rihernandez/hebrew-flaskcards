version: '3.8'

services:
  backend:
    build: ./backend
    container_name: flashcard-backend
    ports:
      - "3001:3001"
    volumes:
      - ./flashcards.words.json:/app/flashcards.words.json:ro
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001
    command: npm run start:dev

  frontend:
    build: ./frontend
    container_name: flashcard-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    command: npm run dev
