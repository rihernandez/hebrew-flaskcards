version: '3.9'

services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  auth:
    build: ./auth
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./auth:/app
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/flaskcard}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@flaskcard.local}
    ports:
      - '3001:3001'
    depends_on:
      - redis
      - mongo

  state-gateway:
    build: ./state-gateway
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./state-gateway:/app
    environment:
      - PORT=3010
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
    ports:
      - '3010:3010'
    depends_on:
      - redis
      - auth

  preferences-ms:
    build: ./preferences-ms
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./preferences-ms:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/flaskcard}
    depends_on:
      - redis
      - mongo

  learning-ms:
    build: ./learning-ms
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./learning-ms:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/flaskcard}
    depends_on:
      - redis
      - mongo

  progression-ms:
    build: ./progression-ms
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./progression-ms:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/flaskcard}
    depends_on:
      - redis
      - mongo

  content:
    build: ./content
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./content:/app
      - ../flashcards.words.json:/flashcards.words.json:ro
      - ../mobile-app/assets/flashcards.words.json:/mobile-assets/flashcards.words.json:ro
    environment:
      - PORT=3003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/flaskcard}
    ports:
      - '3003:3003'
    depends_on:
      - redis
      - auth
      - mongo

volumes:
  mongo_data:
